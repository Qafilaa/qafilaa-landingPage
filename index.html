<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Qafilaa keeps your whole group on one live map — gaps, rally points, last-known positions, and one-tap SOS. Built for rides where the road runs out of signal before it runs out of mountain."
    />
    <meta name="theme-color" content="#070D0B" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://qafilaa.in/" />
    <link rel="icon" type="image/png" href="/qafilaa-icon.png" />
    <link rel="apple-touch-icon" href="/qafilaa-icon.png" />
    <title>Qafilaa — Ride together. No one left behind.</title>

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Qafilaa" />
    <meta property="og:title" content="Qafilaa — Ride together. No one left behind." />
    <meta
      property="og:description"
      content="Keep your whole group on one live map — gaps, rally points, last-known positions, and one-tap SOS. Built for rides where the road runs out of signal before it runs out of mountain."
    />
    <meta property="og:url" content="https://qafilaa.in/" />
    <meta property="og:image" content="https://qafilaa.in/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Qafilaa — live convoy map, rally points and one-tap SOS for group rides." />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Qafilaa — Ride together. No one left behind." />
    <meta
      name="twitter:description"
      content="Keep your whole group on one live map — gaps, rally points, last-known positions, and one-tap SOS."
    />
    <meta name="twitter:image" content="https://qafilaa.in/og-image.png" />

    <!-- Structured data: brand + product -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://qafilaa.in/#organization",
            "name": "Qafilaa",
            "url": "https://qafilaa.in/",
            "logo": "https://qafilaa.in/qafilaa-icon.png",
            "description": "Qafilaa is a convoy-ride safety app that keeps a whole riding group on one live map with rally points, last-known positions and one-tap SOS."
          },
          {
            "@type": "WebSite",
            "@id": "https://qafilaa.in/#website",
            "url": "https://qafilaa.in/",
            "name": "Qafilaa",
            "publisher": { "@id": "https://qafilaa.in/#organization" }
          },
          {
            "@type": "SoftwareApplication",
            "name": "Qafilaa",
            "applicationCategory": "TravelApplication",
            "operatingSystem": "Android, iOS",
            "url": "https://qafilaa.in/",
            "description": "Live convoy map, rally points, last-known positions and one-tap SOS for group motorcycle and overland rides.",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "INR"
            }
          }
        ]
      }
    </script>

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V4RB2XKEGK"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('config', 'G-V4RB2XKEGK');
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
