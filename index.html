    <!-- Structured data: brand + product -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://qafilaa.in/#organization",
            "name": "Qafilaa",
            "url": "https://qafilaa.in/",
            "logo": "https://qafilaa.in/qafilaa-icon.png",
            "slogan": "Built by rider. For fellow riders.",
            "description": "Qafilaa is a group-ride safety app that keeps a whole riding group on one live map with rally points, last-known positions and one-tap SOS."
          },
          {
            "@type": "WebSite",
            "@id": "https://qafilaa.in/#website",
            "url": "https://qafilaa.in/",
            "name": "Qafilaa",
            "publisher": { "@id": "https://qafilaa.in/#organization" }
          },
          {
            "@type": "SoftwareApplication",
            "name": "Qafilaa",
            "applicationCategory": "TravelApplication",
            "operatingSystem": "Android, iOS",
            "url": "https://qafilaa.in/",
            "description": "Live ride map, rally points, last-known positions and one-tap SOS for group motorcycle and overland rides.",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "INR"
            }
          },
          {
            "@type": "FAQPage",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "When does Qafilaa launch?",
                "acceptedAnswer": { "@type": "Answer", "text": "We're rolling out to a first group of crews ahead of the summer riding season. Join the waitlist and you'll be near the front of the line." }
              },
              {
                "@type": "Question",
                "name": "Does it really work without internet?",
                "acceptedAnswer": { "@type": "Answer", "text": "Mostly, with one honest limit. Qafilaa caches the last-known position of every rider, so the map never goes fully blank. But if two riders are both out of signal, neither sees the other move until one of you gets a bar back and the positions sync." }
              },
              {
                "@type": "Question",
                "name": "Is it only for motorcycles?",
                "acceptedAnswer": { "@type": "Answer", "text": "No. It's built for any group moving together where staying together matters, bikes, 4x4 groups, cycling pelotons, trekking groups and expeditions." }
              },
              {
                "@type": "Question",
                "name": "Do I need an account to join a ride?",
                "acceptedAnswer": { "@type": "Answer", "text": "No. Joining a ride takes one shared link, no account, no setup at the trailhead. The email field is only for the launch waitlist." }
              },
              {
                "@type": "Question",
                "name": "Who can see my location?",
                "acceptedAnswer": { "@type": "Answer", "text": "Only the riders in your ride, and only while it's active. When the ride ends, live sharing stops. No public map, no strangers, ever." }
              },
              {
                "@type": "Question",
                "name": "What will it cost?",
                "acceptedAnswer": { "@type": "Answer", "text": "Waitlist riders get the first season free and locked-in early pricing after that. Final plans land before launch." }
              }
            ]
          }
        ]
      }
    </script>
